version: '3.9'

services:
  # Backend Django API
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: smarthire-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./Backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=your-secret-key-here
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - DATABASE_URL=sqlite:///db.sqlite3
    networks:
      - smarthire-network
    depends_on:
      - redis

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: smarthire-redis
    ports:
      - "6379:6379"
    networks:
      - smarthire-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Frontend React App
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: smarthire-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://backend:8000/api
    networks:
      - smarthire-network
    depends_on:
      - backend

  # Nginx (Optional - for production-like setup)
  # nginx:
  #   image: nginx:alpine
  #   container_name: smarthire-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   networks:
  #     - smarthire-network
  #   depends_on:
  #     - backend
  #     - frontend

networks:
  smarthire-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
